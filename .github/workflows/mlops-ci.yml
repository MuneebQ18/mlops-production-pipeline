name: MLOps CI

on:
  push:
    branches:
      - main

jobs:
  verify-runner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Verify Runner
        run: |
          echo "GitHub Actions is working!"
          python --version

      - name: Run Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Tests
        run: |
          export PYTHONPATH=$PWD
          python -m pytest

  build-image:
    needs: verify-runner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t mlops-production-pipeline -f serving/Dockerfile .

  push-image:
    needs: build-image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mlops-production-pipeline:latest \
                      -t ${{ secrets.DOCKER_USERNAME }}/mlops-production-pipeline:${{ github.sha }} \
                      -f serving/Dockerfile .

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mlops-production-pipeline:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mlops-production-pipeline:${{ github.sha }}