name: MLOps CI

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/mlops-production-pipeline

jobs:
  verify-runner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Verify Runner
        run: |
          echo "GitHub Actions is working!"
          python --version

      - name: Run Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Tests
        run: |
          export PYTHONPATH=$PWD
          python -m pytest

  build-image:
    needs: verify-runner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME -f serving/Dockerfile .

  push-image:
    needs: build-image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${{ github.sha }} \
            -f serving/Dockerfile .

      - name: Push Docker Images
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

  deploy-to-ec2:
    needs: push-image
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE_NAME="${{ env.IMAGE_NAME }}:latest"

            echo "Pulling latest image..."
            sudo docker pull $IMAGE_NAME

            echo "Stopping old container..."
            sudo docker stop inference-api || true

            echo "Removing old container..."
            sudo docker rm inference-api || true

            echo "Starting new container..."
            sudo docker run -d \
              --name inference-api \
              --restart unless-stopped \
              -p 8000:8000 \
              $IMAGE_NAME

            echo "Waiting for service..."
            sleep 10

            echo "Checking health..."
            curl --fail http://localhost:8000/health